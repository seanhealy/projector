name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Will be created at HEAD if it doesn't exist."
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build binaries for all targets
        run: |
          set -euo pipefail
          mkdir -p dist
          while IFS=: read -r triple suffix; do
            [ -z "$triple" ] && continue
            out="dist/projector-${suffix}"
            echo "::group::$out"
            deno compile \
              --allow-all \
              --target "$triple" \
              --output "$out" \
              src/main.ts
            echo "::endgroup::"
          done <<'EOF'
          aarch64-apple-darwin:macos-arm64
          x86_64-unknown-linux-gnu:linux-x64
          EOF

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          shasum -a 256 projector-* > SHA256SUMS
          cat SHA256SUMS

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            dist/projector-* dist/SHA256SUMS
